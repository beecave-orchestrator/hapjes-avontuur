<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hapjes Avontuur</title>

  <style>
    :root {
      --pink: #ff6fb1;
      --purple: #7b61ff;
      --yellow: #ffd166;
      --green: #32c48d;
      --blue: #6ed6ff;
      --dark: #2d2a4a;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, #fff0f7 0, transparent 35%),
        radial-gradient(circle at top right, #dff8ff 0, transparent 35%),
        linear-gradient(135deg, #ffe6f2, #fff6bf, #d7f7ff);
      color: var(--dark);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: calc(100vh - 36px);
      background: rgba(255, 255, 255, 0.88);
      border: 4px solid rgba(255, 255, 255, 0.9);
      border-radius: 34px;
      box-shadow: 0 20px 45px rgba(75, 69, 140, 0.2);
      padding: 22px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.8rem, 8vw, 2.5rem);
      line-height: 1;
      color: var(--pink);
      text-shadow: 2px 2px 0 #fff;
    }

    .sound-btn {
      border: 0;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--yellow);
      box-shadow: 0 5px 0 #d8a733;
      font-size: 1.35rem;
      cursor: pointer;
    }

    .ai-note {
      margin: 14px 2px 0;
      text-align: center;
      font-size: 0.78rem;
      line-height: 1.35;
      color: rgba(45, 42, 74, 0.62);
    }

    .sound-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #d8a733;
    }

    .hero {
      text-align: center;
      padding: 8px 0 14px;
    }

    .plate {
      width: 160px;
      height: 160px;
      margin: 4px auto 10px;
      border-radius: 50%;
      background:
        radial-gradient(circle, #ffffff 0 42%, #f0f2ff 43% 62%, #ffffff 63%);
      display: grid;
      place-items: center;
      box-shadow:
        inset 0 0 0 10px rgba(123, 97, 255, 0.08),
        0 14px 24px rgba(123, 97, 255, 0.14);
      position: relative;
      animation: floaty 2.4s ease-in-out infinite;
    }

    .food {
      font-size: 4.4rem;
      filter: drop-shadow(0 8px 0 rgba(0, 0, 0, 0.08));
      transition: transform 0.2s ease;
    }

    .food.pop {
      animation: pop 0.35s ease;
    }

    .counter {
      font-size: clamp(4rem, 18vw, 6rem);
      font-weight: 900;
      color: var(--purple);
      line-height: 0.95;
      text-shadow: 3px 3px 0 #efeaff;
      margin: 4px 0;
    }

    .counter-label {
      font-size: 1.1rem;
      font-weight: 800;
      opacity: 0.8;
    }

    .message {
      min-height: 58px;
      margin: 12px 0 16px;
      background: #fff9db;
      border: 3px dashed #ffd166;
      border-radius: 22px;
      padding: 12px;
      font-size: 1.2rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.7);
    }

    .progress-card {
      background: #f5f3ff;
      border-radius: 22px;
      padding: 14px;
      margin: 12px 0;
      border: 2px solid #ebe7ff;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-weight: 900;
      margin-bottom: 8px;
      font-size: 0.98rem;
    }

    .progress-track {
      height: 20px;
      background: #e1dcff;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.08);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--pink), var(--purple), var(--blue));
      border-radius: 999px;
      transition: width 0.35s ease;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin: 12px 0 16px;
    }

    .stat {
      background: white;
      border-radius: 18px;
      padding: 10px 6px;
      text-align: center;
      box-shadow: 0 8px 18px rgba(123, 97, 255, 0.1);
      border: 2px solid #f2efff;
    }

    .stat strong {
      display: block;
      font-size: 1.35rem;
      color: var(--purple);
    }

    .stat span {
      font-size: 0.75rem;
      font-weight: 900;
      opacity: 0.75;
    }

    .main-btn {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 20px 18px;
      font-size: clamp(1.25rem, 6vw, 1.6rem);
      font-weight: 1000;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6fb1, #7b61ff);
      box-shadow: 0 9px 0 #5540bf, 0 14px 25px rgba(123, 97, 255, 0.26);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }

    .main-btn:active {
      transform: translateY(7px) scale(0.99);
      box-shadow: 0 2px 0 #5540bf, 0 8px 18px rgba(123, 97, 255, 0.18);
    }

    .badges {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 16px 0 12px;
    }

    .badge {
      aspect-ratio: 1;
      border-radius: 18px;
      background: #f3f3f3;
      display: grid;
      place-items: center;
      font-size: 1.55rem;
      filter: grayscale(1);
      opacity: 0.38;
      border: 2px solid #e7e7e7;
      transition: transform 0.25s ease, filter 0.25s ease, opacity 0.25s ease;
    }

    .badge.unlocked {
      background: #fff4be;
      border-color: #ffd166;
      filter: grayscale(0);
      opacity: 1;
      transform: scale(1.05) rotate(-3deg);
      box-shadow: 0 8px 14px rgba(255, 209, 102, 0.35);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .small-btn {
      border: 0;
      border-radius: 18px;
      padding: 13px 10px;
      font-size: 0.95rem;
      font-weight: 900;
      cursor: pointer;
      background: white;
      color: var(--dark);
      border: 2px solid #eeeaff;
      box-shadow: 0 5px 0 #dad4ff;
    }

    .small-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #dad4ff;
    }

    .reward {
      position: fixed;
      inset: 0;
      background: rgba(45, 42, 74, 0.35);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 18px;
      z-index: 20;
    }

    .reward.show {
      display: flex;
    }

    .reward-box {
      width: 100%;
      max-width: 360px;
      background: white;
      border-radius: 32px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      animation: rewardPop 0.3s ease;
    }

    .reward-emoji {
      font-size: 5rem;
      margin-bottom: 8px;
    }

    .reward-title {
      font-size: 1.8rem;
      font-weight: 1000;
      color: var(--pink);
      margin-bottom: 8px;
    }

    .reward-text {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .confetti-piece {
      position: fixed;
      top: -20px;
      font-size: 1.3rem;
      pointer-events: none;
      animation: fall 1.4s linear forwards;
      z-index: 30;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }

    @keyframes pop {
      0% { transform: scale(1); }
      45% { transform: scale(1.28) rotate(-8deg); }
      100% { transform: scale(1); }
    }

    @keyframes rewardPop {
      from { transform: scale(0.75); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    @media (max-width: 380px) {
      .app {
        padding: 18px;
        border-radius: 28px;
      }

      .plate {
        width: 135px;
        height: 135px;
      }

      .food {
        font-size: 3.7rem;
      }

      .message {
        font-size: 1.05rem;
      }

      .badges {
        gap: 6px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="topbar">
      <h1 class="title">Hapjes Avontuur</h1>
      <button class="sound-btn" id="soundButton" onclick="toggleSound()" aria-label="Geluid aan of uit">
        🔊
      </button>
    </div>

    <section class="hero">
      <div class="plate">
        <div class="food" id="food">🍝</div>
      </div>

      <div class="counter" id="counter">0</div>
      <div class="counter-label">hapjes genomen</div>
    </section>

    <div class="message" id="message">
      Klaar voor de eerste superhap?
    </div>

    <section class="progress-card">
      <div class="progress-info">
        <span id="levelName">Level 1: Proever</span>
        <span id="progressText">0 / 5</span>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </section>

    <section class="stats">
      <div class="stat">
        <strong id="combo">0x</strong>
        <span>combo</span>
      </div>

      <div class="stat">
        <strong id="coins">0</strong>
        <span>muntjes</span>
      </div>

      <div class="stat">
        <strong id="level">1</strong>
        <span>level</span>
      </div>
    </section>

    <button class="main-btn" onclick="hapGenomen()">
      hap genomen
    </button>

    <section class="badges" aria-label="Beloningen">
      <div class="badge" id="badge-1">🌟</div>
      <div class="badge" id="badge-2">🦄</div>
      <div class="badge" id="badge-3">🏆</div>
      <div class="badge" id="badge-4">🚀</div>
      <div class="badge" id="badge-5">👑</div>
    </section>

    <section class="actions">
      <button class="small-btn" onclick="veranderEten()">Ander eten</button>
      <button class="small-btn" onclick="resetGame()">Opnieuw</button>
    </section>

    <p class="ai-note" role="note">
      Stemgeluid is AI-gegenereerd.
    </p>
  </main>

  <div class="reward" id="reward">
    <div class="reward-box">
      <div class="reward-emoji" id="rewardEmoji">🎉</div>
      <div class="reward-title" id="rewardTitle">Beloning!</div>
      <div class="reward-text" id="rewardText">Goed gedaan!</div>
      <button class="main-btn" onclick="sluitBeloning()">Verder eten</button>
    </div>
  </div>

  <script>
    let hapjes = 0;
    let coins = 0;
    let combo = 0;
    let soundOn = true;
    let currentFoodIndex = 0;

    const levelSize = 5;

    const foods = ["🍝", "🥦", "🥕", "🍚", "🥔", "🍗", "🍲", "🥪", "🍛", "🥗"];

    const messages = [
      "Wat een kanjerhap!",
      "Je bord wordt al leger!",
      "Super goed bezig!",
      "Hapjesheld gespot!",
      "Daar word je groot en sterk van!",
      "Jij bent echt goed in dit spel!",
      "Nog eentje voor de power?",
      "Mega trots op jou!",
      "Dat was een dappere hap!",
      "Je smaakpapillen gaan op avontuur!"
    ];

    const levelNames = [
      "Level 1: Proever",
      "Level 2: Hapjesheld",
      "Level 3: Bordbaas",
      "Level 4: Supereter",
      "Level 5: Eetkampioen",
      "Level 6: Legendarische Smuller"
    ];

    const rewards = {
      3: {
        emoji: "🌟",
        title: "Ster verdiend!",
        text: "Je hebt 3 hapjes gehaald. Superknap!"
      },
      5: {
        emoji: "🦄",
        title: "Level omhoog!",
        text: "5 hapjes! De eenhoorn is trots op jou."
      },
      10: {
        emoji: "🏆",
        title: "Beker gewonnen!",
        text: "10 hapjes! Jij bent een echte kampioen."
      },
      15: {
        emoji: "🚀",
        title: "Raketboost!",
        text: "15 hapjes! Je vliegt door dit avondeten heen."
      },
      20: {
        emoji: "👑",
        title: "Eetkoningin!",
        text: "20 hapjes! Wat een prestatie."
      }
    };

    // Static OpenAI Dutch speech playback (pre-generated offline).
    // No runtime TTS, no API keys: only local MP3s keyed by stable IDs.
    // Mirrors audio/manifest.json (do not regenerate without updating both).
    const SPEECH_BASE = "audio/";
    const SPEECH_MAP = {
      start: "start.mp3",
      msg_01: "msg_01.mp3",
      msg_02: "msg_02.mp3",
      msg_03: "msg_03.mp3",
      msg_04: "msg_04.mp3",
      msg_05: "msg_05.mp3",
      msg_06: "msg_06.mp3",
      msg_07: "msg_07.mp3",
      msg_08: "msg_08.mp3",
      msg_09: "msg_09.mp3",
      msg_10: "msg_10.mp3",
      reward_3: "reward_3.mp3",
      reward_5: "reward_5.mp3",
      reward_10: "reward_10.mp3",
      reward_15: "reward_15.mp3",
      reward_20: "reward_20.mp3"
    };

    let speechAudio = null;

    // Lazily create the Audio element inside the first user gesture so the
    // browser's autoplay policy unlocks playback. Returns the shared element.
    function ensureSpeechAudio() {
      if (!speechAudio) {
        speechAudio = new Audio();
        speechAudio.preload = "auto";
        speechAudio.volume = 1.0;
      }
      return speechAudio;
    }

    function stopSpeech() {
      if (!speechAudio) return;
      const p = speechAudio.pause();
      if (p && typeof p.catch === "function") p.catch(function () {});
      speechAudio.currentTime = 0;
    }

    // Play a clip by stable ID. No-op when sound is off, when the ID is
    // unknown, or when the browser refuses the gesture (caught silently).
    function playSpeech(id) {
      if (!soundOn) return;
      const file = SPEECH_MAP[id];
      if (!file) return;

      const audio = ensureSpeechAudio();
      stopSpeech();
      audio.src = SPEECH_BASE + file;
      const p = audio.play();
      if (p && typeof p.catch === "function") {
        p.catch(function () { /* autoplay rejected; next gesture retries */ });
      }
    }

    function hapGenomen() {
      hapjes++;
      combo++;
      coins += 2 + Math.min(combo, 5);

      updateUI();
      playBiteSound();
      popFood();

      const randomMessage = messages[Math.floor(Math.random() * messages.length)];
      document.getElementById("message").textContent = randomMessage;

      // Resolve the matching clip: manifest freezes msg_01..msg_10 against
      // messages[] order, so the spoken clip always matches the shown text.
      const msgIndex = messages.indexOf(randomMessage);
      if (msgIndex >= 0) {
        const id = "msg_" + String(msgIndex + 1).padStart(2, "0");
        playSpeech(id);
      }

      if (hapjes % 5 === 0) {
        playLevelSound();
        maakConfetti();
      }

      if (rewards[hapjes]) {
        unlockBadge(hapjes);
        toonBeloning(rewards[hapjes]);
      }
    }

    function updateUI() {
      const level = Math.floor(hapjes / levelSize) + 1;
      const progressInLevel = hapjes % levelSize;
      const progressPercent = (progressInLevel / levelSize) * 100;

      document.getElementById("counter").textContent = hapjes;
      document.getElementById("combo").textContent = combo + "x";
      document.getElementById("coins").textContent = coins;
      document.getElementById("level").textContent = level;
      document.getElementById("progressFill").style.width = progressPercent + "%";

      const levelName = levelNames[Math.min(level - 1, levelNames.length - 1)];
      document.getElementById("levelName").textContent = levelName;
      document.getElementById("progressText").textContent = progressInLevel + " / " + levelSize;
    }

    function unlockBadge(hapjesAantal) {
      const badgeMap = {
        3: "badge-1",
        5: "badge-2",
        10: "badge-3",
        15: "badge-4",
        20: "badge-5"
      };

      const badgeId = badgeMap[hapjesAantal];

      if (badgeId) {
        document.getElementById(badgeId).classList.add("unlocked");
      }
    }

    function toonBeloning(reward) {
      document.getElementById("rewardEmoji").textContent = reward.emoji;
      document.getElementById("rewardTitle").textContent = reward.title;
      document.getElementById("rewardText").textContent = reward.text;
      document.getElementById("reward").classList.add("show");

      // Rewards are frozen as one clip per hapjes threshold (title + body).
      playSpeech("reward_" + hapjes);

      playRewardSound();
      maakConfetti();
    }

    function sluitBeloning() {
      document.getElementById("reward").classList.remove("show");
    }

    function veranderEten() {
      currentFoodIndex = (currentFoodIndex + 1) % foods.length;
      document.getElementById("food").textContent = foods[currentFoodIndex];
      playPopSound();
      popFood();
    }

    function resetGame() {
      hapjes = 0;
      coins = 0;
      combo = 0;

      document.getElementById("message").textContent = "Klaar voor de eerste superhap?";
      document.querySelectorAll(".badge").forEach(badge => {
        badge.classList.remove("unlocked");
      });

      updateUI();
      playPopSound();

      // Reset returns to the start line; play the matching start clip.
      playSpeech("start");
    }

    function toggleSound() {
      soundOn = !soundOn;
      document.getElementById("soundButton").textContent = soundOn ? "🔊" : "🔇";

      if (soundOn) {
        // First "on" gesture unlocks audio playback for the session.
        // Creating/resuming the Audio element here satisfies autoplay policy.
        ensureSpeechAudio();
        playPopSound();
      } else {
        stopSpeech();
      }
    }

    function popFood() {
      const food = document.getElementById("food");
      food.classList.remove("pop");

      void food.offsetWidth;

      food.classList.add("pop");
    }

    function maakConfetti() {
      const confetti = ["🎉", "⭐", "💖", "🌈", "✨", "🎈"];

      for (let i = 0; i < 28; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.textContent = confetti[Math.floor(Math.random() * confetti.length)];
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.animationDuration = 0.9 + Math.random() * 1.1 + "s";
        piece.style.fontSize = 1 + Math.random() * 1.2 + "rem";

        document.body.appendChild(piece);

        setTimeout(() => {
          piece.remove();
        }, 2200);
      }
    }

    function playBiteSound() {
      playTone(520, 0.06, "sine");
      setTimeout(() => playTone(760, 0.08, "triangle"), 70);
    }

    function playLevelSound() {
      playTone(600, 0.08, "sine");
      setTimeout(() => playTone(800, 0.08, "sine"), 90);
      setTimeout(() => playTone(1000, 0.12, "sine"), 180);
    }

    function playRewardSound() {
      playTone(660, 0.08, "triangle");
      setTimeout(() => playTone(880, 0.08, "triangle"), 100);
      setTimeout(() => playTone(1100, 0.18, "triangle"), 200);
    }

    function playPopSound() {
      playTone(420, 0.05, "square");
    }

    function playTone(frequency, duration, type) {
      if (!soundOn) return;

      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      const audioContext = new AudioContext();
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = type;
      oscillator.frequency.value = frequency;

      gain.gain.setValueAtTime(0.08, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);

      oscillator.start();
      oscillator.stop(audioContext.currentTime + duration);

      oscillator.onended = () => {
        audioContext.close();
      };
    }

    updateUI();
  </script>
</body>
</html>
